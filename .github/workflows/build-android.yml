name: Build Android APK

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.x
          cache: true

      - run: flutter pub get
      - run: flutter build apk --release

      - name: Get version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Perdiem ${{ steps.version.outputs.tag }}"
          body: |
            ## Perdiem ${{ steps.version.outputs.tag }}

            ### Download
            - **perdiem-${{ steps.version.outputs.tag }}.apk** — Android release APK

            ### Changes
            See [commit history](https://github.com/${{ github.repository }}/commits/${{ steps.version.outputs.tag }}) for details.
          files: build/app/outputs/flutter-apk/app-release.apk
          fail_on_unmatched_files: true
