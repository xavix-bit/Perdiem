name: Build Android APK

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.x
          cache: true

      - run: flutter pub get

      - name: Get version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build split APKs per architecture
        run: flutter build apk --release --split-per-abi

      - name: Build universal APK
        run: flutter build apk --release

      - name: Rename APKs
        run: |
          cd build/app/outputs/flutter-apk
          mv app-arm64-v8a-release.apk    "perdiem-${{ steps.version.outputs.tag }}-arm64-v8a.apk"
          mv app-armeabi-v7a-release.apk   "perdiem-${{ steps.version.outputs.tag }}-armeabi-v7a.apk"
          mv app-x86_64-release.apk        "perdiem-${{ steps.version.outputs.tag }}-x86_64.apk"
          mv app-release.apk               "perdiem-${{ steps.version.outputs.tag }}-universal.apk"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Perdiem ${{ steps.version.outputs.tag }}"
          body: |
            ## Perdiem ${{ steps.version.outputs.tag }}

            ### Download

            | APK | Architecture | Description |
            |-----|-------------|-------------|
            | `perdiem-${{ steps.version.outputs.tag }}-arm64-v8a.apk` | ARM64 | Most modern Android phones (推荐) |
            | `perdiem-${{ steps.version.outputs.tag }}-armeabi-v7a.apk` | ARM32 | Older/low-end devices |
            | `perdiem-${{ steps.version.outputs.tag }}-x86_64.apk` | x86_64 | Emulators, Chromebooks |
            | `perdiem-${{ steps.version.outputs.tag }}-universal.apk` | All | Works on all devices (larger size) |

            > Not sure which to download? Choose **arm64-v8a** for most phones, or **universal** if unsure.

            ### Changes
            See [commit history](https://github.com/${{ github.repository }}/commits/${{ steps.version.outputs.tag }}) for details.
          files: |
            build/app/outputs/flutter-apk/perdiem-${{ steps.version.outputs.tag }}-arm64-v8a.apk
            build/app/outputs/flutter-apk/perdiem-${{ steps.version.outputs.tag }}-armeabi-v7a.apk
            build/app/outputs/flutter-apk/perdiem-${{ steps.version.outputs.tag }}-x86_64.apk
            build/app/outputs/flutter-apk/perdiem-${{ steps.version.outputs.tag }}-universal.apk
          fail_on_unmatched_files: true
