<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>日计 - 添加物品</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800&amp;family=Plus+Jakarta+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .polka-dot-bg {
            background-color: #FFFDF5;
            background-image: radial-gradient(#cbc3d7 1.5px, transparent 1.5px);
            background-size: 24px 24px;
        }
        .striped-bg {
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(139, 92, 246, 0.05) 10px, rgba(139, 92, 246, 0.05) 20px);
            background-color: #ffffff;
        }
        .input-inset {
            box-shadow: inset 3px 3px 6px rgba(0,0,0,0.06), 4px 4px 0px 0px rgba(30,41,59,1);
        }
        .bouncy-transition {
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .hard-shadow-sm { shadow-[2px_2px_0px_0px_rgba(30,41,59,1)] }
        .hard-shadow-md { shadow-[4px_4px_0px_0px_rgba(30,41,59,1)] }
        .hard-shadow-pink { shadow-[6px_6px_0px_0px_#F472B6] }
        
        input:focus, select:focus {
            outline: none;
            border-color: #6b38d4;
            box-shadow: inset 3px 3px 6px rgba(0,0,0,0.06), 4px 4px 0px 0px #1E293B;
        }
    </style>
<script id="tailwind-config">

          darkMode: "class",
          theme: {
            extend: {

                      "on-secondary": "#ffffff",
                      "surface-tint": "#6d3bd7",
                      "surface-container": "#f3ebf8",

                      "primary": "#6b38d4",
                      "on-primary-container": "#fffbff",
                      "outline": "#7b7486",
                      "secondary": "#F472B6",
                      "border": "#E2E8F0",
                      "surface-bright": "#fef7ff",
                      "tertiary-container": "#a76500",
                      "accent-foreground": "#FFFFFF",
                      "input-border": "#CBD5E1",
                      "surface-container-highest": "#e7e0ed",
                      "on-background": "#1d1a23",
                      "inverse-surface": "#322f39",
                      "on-surface": "#1d1a23",
                      "secondary-fixed-dim": "#ffafd3",
                      "muted-foreground": "#64748B",
                      "muted": "#F1F5F9",
                      "on-surface-variant": "#494454",
                      "on-tertiary-fixed": "#2c1700",
                      "outline-variant": "#cbc3d7",
                      "on-tertiary-container": "#fffbff",
                      "surface-variant": "#e7e0ed",

                      "on-primary": "#ffffff",
                      "inverse-primary": "#d0bcff",
                      "ring": "#8B5CF6",
                      "primary-fixed": "#e9ddff",

                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",

              }
            },
          },
        }

<style>
        body {
          min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="polka-dot-bg text-on-background min-h-screen pb-32 relative overflow-x-hidden">
<!-- Background Confetti -->
<div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
<div class="absolute top-24 left-8 w-4 h-4 bg-secondary rounded-full border-2 border-on-background shadow-[2px_2px_0px_0px_rgba(30,41,59,1)]"></div>
<div class="absolute top-40 right-12 w-0 h-0 border-l-[10px] border-l-transparent border-r-[10px] border-r-transparent border-b-[16px] border-b-tertiary drop-shadow-[2px_2px_0px_rgba(30,41,59,1)] rotate-12"></div>
<div class="absolute bottom-48 left-16 w-0 h-0 border-l-[12px] border-l-transparent border-r-[12px] border-r-transparent border-b-[20px] border-b-primary drop-shadow-[2px_2px_0px_rgba(30,41,59,1)] -rotate-12"></div>
<div class="absolute bottom-64 right-10 w-5 h-5 bg-quaternary border-2 border-on-background shadow-[2px_2px_0px_0px_rgba(30,41,59,1)] rotate-45"></div>
</div>
<!-- Top AppBar -->
<header class="sticky top-0 z-50 flex justify-between items-center w-full px-gutter py-unit-sm bg-background dark:bg-background border-b-2 border-on-background dark:border-outline-variant shadow-[4px_4px_0px_0px_rgba(30,41,59,1)]">
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-primary hover:scale-110 bouncy-transition active:translate-y-0.5" data-icon="arrow_back">arrow_back</button>
<h1 class="text-headline-sm font-headline-sm text-primary dark:text-primary-fixed-dim">添加物品</h1>
</div>
</header>
<main class="relative z-10 max-w-[800px] mx-auto px-gutter pt-unit-lg flex flex-col gap-12">
<!-- Photo Upload Section -->
<section class="relative group">
<div class="absolute -top-6 -left-6 w-16 h-16 bg-tertiary rounded-full border-2 border-on-background shadow-[4px_4px_0px_0px_rgba(30,41,59,1)] flex items-center justify-center z-10 -rotate-12 group-hover:rotate-0 bouncy-transition">
<span class="material-symbols-outlined text-on-background" data-icon="photo_camera" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
</div>
<div class="w-full aspect-[16/9] bg-white border-4 border-dashed border-primary rounded-xl flex flex-col items-center justify-center gap-2 hover:bg-surface-container-low bouncy-transition cursor-pointer shadow-[4px_4px_0px_0px_rgba(30,41,59,1)] overflow-hidden">
<span class="text-label-caps font-label-caps text-primary">添加照片</span>
<p class="text-body-md text-muted-foreground">支持 JPG, PNG 格式</p>
</div>
</section>
<!-- Form Section -->
<section class="grid grid-cols-1 md:grid-cols-2 gap-8">
<!-- Left Column -->
<div class="space-y-6">
<div class="flex flex-col gap-2">
<label class="text-label-caps font-label-caps text-on-background uppercase">物品名称</label>
<input class="w-full h-14 px-4 bg-surface-container-lowest border-2 border-on-background rounded-lg font-body-md input-inset transition-all" placeholder="例如：新款降噪耳机" type="text"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-label-caps font-label-caps text-on-background uppercase">品牌</label>
<input class="w-full h-14 px-4 bg-surface-container-lowest border-2 border-on-background rounded-lg font-body-md input-inset transition-all" placeholder="品牌名称" type="text"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-label-caps font-label-caps text-on-background uppercase">分类</label>
<div class="relative">
<select class="w-full h-14 px-4 bg-surface-container-lowest border-2 border-on-background rounded-lg font-body-md input-inset appearance-none cursor-pointer">
<option>电子产品</option>
<option>服饰配饰</option>
<option>家居用品</option>
<option>户外运动</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-4 pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
<!-- Right Column -->
<div class="space-y-6">
<div class="flex flex-col gap-2">
<label class="text-label-caps font-label-caps text-on-background uppercase">价格 (¥)</label>
<input class="w-full h-14 px-4 bg-surface-container-lowest border-2 border-on-background rounded-lg font-body-md input-inset transition-all" placeholder="0.00" type="number"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-label-caps font-label-caps text-on-background uppercase">购入日期</label>
<input class="w-full h-14 px-4 bg-surface-container-lowest border-2 border-on-background rounded-lg font-body-md input-inset transition-all" type="date"/>
</div>
<div class="flex flex-col gap-4">
<label class="text-label-caps font-label-caps text-on-background uppercase flex justify-between">
<span>预期使用时长</span>
<span class="text-primary">365 天</span>
</label>
<div class="relative h-12 flex items-center">
<div class="w-full h-4 bg-surface-container-highest border-2 border-on-background rounded-full overflow-hidden shadow-[inset_1px_1px_3px_rgba(0,0,0,0.1)]">
<div class="h-full bg-secondary w-1/2 border-r-2 border-on-background"></div>
</div>
<div class="absolute left-1/2 -translate-x-1/2 w-10 h-10 bg-tertiary border-[3px] border-on-background rounded-full shadow-[4px_4px_0px_0px_rgba(30,41,59,1)] hover:scale-110 bouncy-transition cursor-grab active:cursor-grabbing flex items-center justify-center">
<div class="w-3 h-3 bg-white rounded-full opacity-50"></div>
</div>
</div>
</div>
</div>
</section>
<!-- Result Card -->
<section class="mt-8">
<div class="relative striped-bg border-2 border-on-background rounded-xl p-8 shadow-[6px_6px_0px_0px_rgba(30,41,59,1)] hover:-rotate-1 bouncy-transition group overflow-hidden">
<div class="relative z-10 flex flex-col md:flex-row md:items-center justify-between gap-6">
<div>
<h3 class="text-label-caps font-label-caps text-on-background/60 uppercase mb-2 bg-white/80 inline-block px-2 py-1 rounded border border-on-background/20">目标日均成本</h3>
<div class="flex items-baseline gap-2 mt-2">
<span class="text-headline-xl font-headline-xl text-[#1E1B4B] drop-shadow-sm">¥ 5.48</span>
<span class="text-body-lg font-body-lg text-on-surface-variant font-bold bg-white/60 px-2 rounded-full border border-on-background/10">/ 每天</span>
</div>
</div>
<div class="flex gap-4">
<div class="p-4 bg-white/90 backdrop-blur-sm rounded-lg border-2 border-on-background shadow-[4px_4px_0px_0px_rgba(30,41,59,1)] flex flex-col items-center justify-center min-w-[100px] hover:-translate-y-1 bouncy-transition">
<span class="text-label-caps font-label-caps text-on-background/60">每周</span>
<span class="text-headline-sm font-headline-sm text-on-background mt-1">¥38</span>
</div>
<div class="p-4 bg-white/90 backdrop-blur-sm rounded-lg border-2 border-on-background shadow-[4px_4px_0px_0px_rgba(30,41,59,1)] flex flex-col items-center justify-center min-w-[100px] hover:-translate-y-1 bouncy-transition">
<span class="text-label-caps font-label-caps text-on-background/60">每月</span>
<span class="text-headline-sm font-headline-sm text-on-background mt-1">¥164</span>
</div>
</div>
</div>
</div>
</section>
<!-- Save Button -->
<section class="flex justify-center pb-12 mt-4">
<button class="group relative px-12 py-4 bg-primary rounded-full border-2 border-on-background shadow-[4px_4px_0px_0px_rgba(30,41,59,1)] hover:shadow-[6px_6px_0px_0px_rgba(30,41,59,1)] hover:-translate-y-1 active:translate-y-1 active:shadow-[2px_2px_0px_0px_rgba(30,41,59,1)] bouncy-transition flex items-center gap-4 z-10">
<span class="text-headline-sm font-headline-sm text-white">保存</span>
<div class="w-8 h-8 bg-white rounded-full flex items-center justify-center group-hover:translate-x-2 bouncy-transition border border-on-background/20">
<span class="material-symbols-outlined text-primary" data-icon="arrow_forward">arrow_forward</span>
</div>
</button>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-unit-md pb-safe py-unit-xs bg-surface-container dark:bg-surface-container-highest border-t-2 border-on-background dark:border-outline-variant shadow-[0px_-4px_0px_0px_rgba(30,41,59,1)]">
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant px-4 py-2 hover:bg-surface-container-high dark:hover:bg-surface-variant transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="text-label-caps font-label-caps">首页</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant px-4 py-2 hover:bg-surface-container-high dark:hover:bg-surface-variant transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="inventory_2">inventory_2</span>
<span class="text-label-caps font-label-caps">资产</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant px-4 py-2 hover:bg-surface-container-high dark:hover:bg-surface-variant transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="equalizer">equalizer</span>
<span class="text-label-caps font-label-caps">统计</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant px-4 py-2 hover:bg-surface-container-high dark:hover:bg-surface-variant transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="text-label-caps font-label-caps">设置</span>
</a>
</nav>
</body></html>
