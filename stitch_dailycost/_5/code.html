<style>
        .dot-pattern {
            background-image: radial-gradient(circle, #E2E8F0 1.5px, transparent 1.5px);
            background-size: 24px 24px;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .pop-shadow {
            box-shadow: 6px 6px 0px 0px #1d1a23;
        }
        .pop-shadow-sm {
            box-shadow: 4px 4px 0px 0px #1d1a23;
        }
        .pop-shadow-mini {
            box-shadow: 2px 2px 0px 0px #1d1a23;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background font-body-md text-on-surface min-h-screen flex items-center justify-center p-unit-sm dot-pattern relative">
<!-- Focus: Backdrop Blur -->
<div class="fixed inset-0 backdrop-blur-md bg-background/50 z-0"></div>
<!-- Modal Content Canvas -->
<div class="relative w-full max-w-md bg-card border-2 border-on-surface rounded-xl p-unit-lg pop-shadow animate-in fade-in zoom-in duration-300 overflow-visible z-10">
<!-- Background Squiggles / Decorative Elements (Mobile suppression check: only key ones kept) -->
<div class="absolute -top-6 -left-6 w-12 h-12 bg-tertiary border-2 border-on-surface rounded-full z-[-1] pop-shadow-mini"></div>
<div class="absolute -bottom-4 -right-4 w-16 h-16 bg-quaternary border-2 border-on-surface rotate-12 z-[-1] pop-shadow-mini flex items-center justify-center">
<span class="material-symbols-outlined text-white">warning</span>
</div>
<!-- Warning Illustration -->
<div class="flex justify-center mb-unit-lg">
<div class="relative group">
<!-- Iconography Burst Effect -->
<div class="relative w-28 h-28 bg-error-container border-4 border-on-surface rounded-full flex items-center justify-center pop-shadow-sm group-hover:rotate-12 transition-transform duration-300">
<span class="material-symbols-outlined text-error text-[56px]" data-weight="fill" style="font-variation-settings: 'FILL' 1;">delete_forever</span>
</div>
<!-- Decorative Sticker Elements -->
<div class="absolute -top-3 -right-3 w-10 h-10 bg-secondary border-2 border-on-surface rounded-lg rotate-12 flex items-center justify-center pop-shadow-mini">
<span class="material-symbols-outlined text-white text-[20px]">close</span>
</div>
</div>
</div>
<!-- Headline & Subtext -->
<div class="text-center space-y-unit-xs mb-unit-lg">
<h1 class="font-headline-md text-headline-md text-on-surface">确定要删除吗？</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[280px] mx-auto">此操作无法撤销，该物品的所有记录将永久删除。</p>
</div>
<!-- Preview Card (Bento Style) -->
<div class="bg-surface-container border-2 border-on-surface rounded-xl p-unit-sm mb-unit-lg flex items-center gap-unit-sm pop-shadow-mini">
<div class="w-16 h-16 bg-white border-2 border-on-surface rounded-lg flex items-center justify-center overflow-hidden shrink-0">
<img alt="MacBook Pro M3" class="w-12 h-12 object-contain" data-alt="A clean, vector-style illustration of a modern MacBook Pro laptop in space gray. The image is rendered in a minimalist flat design style that perfectly fits the vibrant and high-contrast digital asset management app interface. The laptop is positioned centrally against a crisp white background with sharp outlines and high-key lighting to emphasize its sleek hardware profile." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCLdrv3wrGNvgcrLw6MnwZ2Z1obuWDwL5HGfXVzWh-Pkmbkf0mwV_odsfhNyjW8imNreFtclACvUtQyoB5AjhNIFKELooX8N3vc2WS0iu4PG5ly87sJbeTdfx-Erwtq4BNH2szR5luPbRHtiBaEG_ytTrCCiTuZNV5QZA0qkBj5MM9okFaod_yC4CtFfOUtKslTruKN1801nnxJZxOnuivp4yfvqV2bfb4fTyPv1huJZyoPQr6pMEqMWUddOmJ0-7EP-5akR0ZzQFcx"/>
</div>
<div class="flex-1 overflow-hidden">
<div class="font-label-caps text-label-caps text-primary uppercase tracking-wider mb-1">正在删除项目</div>
<div class="font-headline-sm text-headline-sm text-on-surface truncate">MacBook Pro M3</div>
<div class="font-body-md text-body-md text-on-surface-variant">购买于 2023年11月</div>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col gap-unit-md">
<!-- Primary Action -->
<button class="w-full bg-gradient-to-r from-[#ba1a1a] to-[#F472B6] text-white font-headline-sm text-headline-sm py-5 px-unit-md rounded-full border-4 border-on-surface pop-shadow-sm hover:translate-y-[-2px] hover:shadow-[6px_6px_0px_0px_rgba(29,26,35,1)] active:translate-y-[2px] active:shadow-[2px_2px_0px_0px_rgba(29,26,35,1)] transition-all flex items-center justify-center gap-3">
                确认删除
                <div class="w-10 h-10 bg-white border-2 border-on-surface rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-error text-[24px]">delete</span>
</div>
</button>
<!-- Secondary Action -->
<button class="w-full bg-card text-on-surface font-body-lg text-body-lg py-5 px-unit-md rounded-full border-4 border-on-surface hover:bg-surface-container transition-colors duration-200">
                取消
            </button>
</div>
</div>
<!-- Background Pattern/Shape for depth -->
<div class="fixed inset-0 pointer-events-none z-[-2] flex items-center justify-center overflow-hidden">
<svg class="w-[120%] h-[120%] opacity-10" viewbox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
<circle cx="20" cy="20" fill="#6b38d4" r="15"></circle>
<rect fill="#FBBF24" height="20" transform="rotate(15 80 70)" width="20" x="70" y="60"></rect>
<path d="M10,80 Q30,60 50,80 T90,80" fill="none" stroke="#F472B6" stroke-width="2"></path>
</svg>
</div>
